name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm type-check

  test-backend:
    name: Test Backend (181 tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: merchantflow
          POSTGRES_PASSWORD: merchantflow_dev
          POSTGRES_DB: merchantflow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U merchantflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      PORT: "3005"
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://merchantflow:merchantflow_dev@localhost:5433/merchantflow
      REDIS_URL: redis://localhost:6381
      JWT_SECRET: test-secret-minimum-32-characters-long
      API_KEY_SALT: test-salt-for-ci
      SHOPIFY_API_KEY: mock-key
      SHOPIFY_API_SECRET: mock-secret
      SHOPIFY_APP_URL: http://localhost:3006
      IDEMPOTENCY_KEY_TTL_HOURS: "24"
      OUTBOX_POLL_INTERVAL_MS: "1000"
      OUTBOX_BATCH_SIZE: "50"
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @merchantflow/api exec prisma migrate deploy
      - name: Run backend tests
        run: pnpm --filter @merchantflow/api test

  test-frontend:
    name: Test Frontend (150 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run frontend tests
        run: pnpm --filter @merchantflow/web test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
